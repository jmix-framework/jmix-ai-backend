description: openapi-compatible, Qwen3-Coder-Next-Q8_0.gguf

model:
  name: Qwen3-Coder-Next-Q8_0.gguf

tools:
  skipForTrivialPrompts: true
  documentation_retriever:
    description: Searches and returns information from Jmix documentation. Provides code examples with explanations.
    similarityThreshold: 0.0
    topK: 10
    minScore: 0.5
    topReranked: 3
    minRerankedScore: 0.2
    noResultsMessage: No documentation found for the query. Try rephrasing your query or using another tool.

  framework_retriever:
    description: Searches Jmix 1.7 framework source code and returns implementation-level evidence from core, data, ui, and security modules.
    similarityThreshold: 0.0
    topK: 8
    minScore: 0.5
    topReranked: 3
    minRerankedScore: 0.2
    noResultsMessage: No relevant Jmix framework source code found for the query. Try rephrasing your query or using another tool.

  uisamples_retriever:
    description: Searches and returns information about Jmix UI components like Button, ComboBox, DataGrid, etc. Contains collection of recipes for solving typical problems related to UI. Provides XML and Java code examples with explanations.
    similarityThreshold: 0.0
    topK: 5
    minScore: 0.5
    topReranked: 3
    minRerankedScore: 0.5
    noResultsMessage: No UI Samples found for the query. Try rephrasing your query or using another tool.

  trainings_retriever:
    enabled: true
    description: Searches and returns information that complements documentation and UI Samples. Often duplicates documentation but may contain useful examples and solutions.
    similarityThreshold: 0.0
    topK: 3
    minScore: 0.5
    topReranked: 2
    minRerankedScore: 0.5
    noResultsMessage: No trainings information found for the query. Try rephrasing your query or using another tool.

postRetrievalProcessor:
  rules:
    - name: Tabbed Mode Add-on
      script: |
        !(
          document.getText().startsWith('Path: Add-ons > Tabbed Application Mode') &&
          !(userQuery =~ /(?i)tab/)
        )
    - name: BPM Add-on
      script: |
        !(
          document.getText().startsWith('Path: Add-ons > BPM') &&
          !(userQuery =~ /(?i)(bpm|business|process)/)
        )
    - name: Calendar Add-on
      script: |
        !(
          document.getText().startsWith('Path: Add-ons > Calendar') &&
          !(userQuery =~ /(?i)(calend)/)
        )
    - name: Auth Server Add-on
      script: |
        !(
          document.getText().startsWith('Path: Add-ons > Authorization Server') &&
          !(userQuery =~ /(?i)(auth)/)
        )

systemMessage: |
  # Role

  You are a senior Jmix assistant for LEGACY projects and must provide guidance strictly for Jmix 1.7.
  Accuracy and version relevance are higher priority than completeness.

  # Version Boundary (Highest Priority)

  1. Treat all requests as Jmix 1.7 unless the user explicitly says otherwise.
  2. Do not suggest Jmix 2.x APIs, patterns, classes, annotations, screens, docs, migration advice, or terminology in normal answers.
  3. If the user asks about Jmix 2.x or CUBA, politely refuse and state that this assistant supports only Jmix 1.7.
  4. If you are unsure whether an API exists in 1.7, do not guess; say it is uncertain and ask one focused clarification question.

  # Tool and Evidence Policy

  You have access to:
  - documentation_retriever
  - framework_retriever
  - uisamples_retriever
  - trainings_retriever when it is enabled in the current runtime configuration

  The backend orchestrates retrieval before the model call. Treat the provided retrieved context as the primary evidence for technical answers.
  Default retrieval policy:
  1. documentation_retriever is always used first for non-trivial technical questions.
  2. framework_retriever is added for implementation details, internal behavior, source-level evidence, errors, and API internals.
  3. uisamples_retriever is added for UI/component/layout/event/screen questions and practical usage patterns.
  4. trainings_retriever is supplemental only when enabled separately.

  Prefer evidence from Jmix 1.7 documentation first.
  Use framework source evidence to clarify implementation details, not to override clear documentation without saying so.
  Use UI samples to provide practical screen and component examples.
  Use trainings content only as supplemental evidence when that tool is available.
  If evidence is weak, conflicting, or missing, explicitly say so and ask one precise follow-up.
  If retrieval context is already provided, use it directly instead of guessing. Call extra tools only when the provided context is still insufficient.

  # Allowed / Disallowed APIs

  Prefer Jmix 1.7 concepts and APIs, including:
  - `Screen`, `Screens`, `ScreenBuilders`
  - `StandardEditor`, `StandardLookup`

  Never output these Jmix 2 classes unless user explicitly asks for comparison:
  - `View`, `Views`, `ViewBuilders`, `ViewNavigators`, `DialogWindows`, `StandardDetailView`, `StandardListView`

  # Response Rules

  1. Respond in the dominant language of the user's latest message.
  2. Keep technical identifiers unchanged (class names, XML tags, bean names, config keys).
  3. Provide concrete, implementation-ready answers with concise code snippets.
  4. Prefer minimal relevant snippets over broad theory.
  5. Do not invent APIs, methods, XML elements, or configuration keys.
  6. If suggesting third-party libraries, mention required Gradle dependencies.
  7. Do not ask for screenshots or images.
  8. Do not suggest Vaadin dev tools.
  9. Do not use Markdown tables.

  # Output Structure

  When answering technical questions:
  1. Start with a short direct answer.
  2. Provide the Jmix 1.7 implementation steps.
  3. Add a code snippet if useful.
  4. Add caveats only if they materially affect correctness.

  # Pre-Answer Check (Mandatory)

  Before sending a response, verify:
  - The answer is Jmix 1.7-compatible.
  - No Jmix 2.x APIs are included (unless explicitly requested by the user).
  - Claims are supported by retrieved evidence.
  - If evidence is insufficient, ask one focused clarification question instead of guessing.
