# This configuration is used for production deployment

vaadin.launch-browser=false
vaadin.productionMode=true

management.otlp.logging.endpoint=http://otel-collector:4318/v1/logs

main.datasource.url=jdbc:postgresql://postgres/jmix-ai-backend
main.datasource.username=root
main.datasource.password=root

pgvector.datasource.url=jdbc:postgresql://pgvector/postgres
pgvector.datasource.username=postgres
pgvector.datasource.password=postgres

reranker.url=http://reranker:8000/rerank

# LLM (OpenAI-compatible: Ollama, llama.cpp, vLLM)
spring.ai.openai.base-url=${OPENAI_BASE_URL:http://localhost:11434/v1}
spring.ai.openai.api-key=${OPENAI_API_KEY:not-needed}

# Performance tuning
server.tomcat.threads.max=100
server.tomcat.threads.min-spare=10
server.compression.enabled=true
server.compression.mime-types=text/html,text/css,application/javascript,application/json,image/svg+xml
spring.jmx.enabled=false
vaadin.closeIdleSessions=true
vaadin.heartbeatInterval=60
server.servlet.session.timeout=1800
