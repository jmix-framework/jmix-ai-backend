# This configuration is used for local development with services provided by /docker-compose.yml

ui.login.defaultUsername=admin
ui.login.defaultPassword=admin

main.datasource.url=jdbc:postgresql://localhost:15432/jmix-ai-backend
main.datasource.username=postgres
main.datasource.password=postgres

pgvector.datasource.url=jdbc:postgresql://localhost:15433/vectorstore
pgvector.datasource.username=postgres
pgvector.datasource.password=postgres

spring.ai.openai.base-url=http://localhost:6666
spring.ai.openai.api-key="dummy_key"
answer-checks.evaluator.base-url=https://api.openai.com
answer-checks.evaluator.api-key=${ANSWER_CHECKS_EVALUATOR_API_KEY:}
answer-checks.evaluator.model=${ANSWER_CHECKS_EVALUATOR_MODEL:gpt-5-mini}
answer-checks.parallelism=1
rag.embedding.base-url=http://localhost:6667
rag.embedding.api-key="dummy_key"
rag.embedding.model=BAAI/bge-m3
vectorstore.embedding-dimensions=1024
uisamples.local-path=/tmp/jmix-ui-samples
