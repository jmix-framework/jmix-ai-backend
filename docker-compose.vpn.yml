упservices:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: jmix-ai-backend
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: [ "postgres", "-p", "15432" ]
    network_mode: host
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -p 15432 -U postgres -d jmix-ai-backend" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: vectorstore
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    command: [ "postgres", "-p", "15433" ]
    network_mode: host
    volumes:
      - pgvector-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -h 127.0.0.1 -p 15433 -U postgres -d vectorstore" ]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  reranker:
    build:
      context: ./reranker
      dockerfile: Dockerfile
    image: jmix-ai-reranker:latest
    network_mode: host
    restart: unless-stopped

  otel-collector:
    image: otel/opentelemetry-collector-contrib:latest
    command:
      - "--config=env:OTEL_CONFIG"
    network_mode: host
    environment:
      OTEL_CONFIG: |
        receivers:
          otlp:
            protocols:
              grpc:
                endpoint: 0.0.0.0:4317
              http:
                endpoint: 0.0.0.0:4318
        processors:
          batch:
        exporters:
          debug:
            verbosity: basic
        service:
          pipelines:
            logs:
              receivers: [otlp]
              processors: [batch]
              exporters: [debug]
            traces:
              receivers: [otlp]
              processors: [batch]
              exporters: [debug]
            metrics:
              receivers: [otlp]
              processors: [batch]
              exporters: [debug]
    restart: unless-stopped

volumes:
  postgres-data:
  pgvector-data:
